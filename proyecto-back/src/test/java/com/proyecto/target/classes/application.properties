# =============================================
# Servidor
# Puerto donde corre el backend Java
# =============================================
server.port=3001

# =============================================
# Base de datos MySQL (local para desarrollo)
# Cambia estos valores según tu configuración
# =============================================
spring.datasource.url=jdbc:mysql://127.0.0.1:3307/proyecto_n8n?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / Hibernate
# Configuración del ORM que maneja la base de datos
# ddl-auto=none → no modifica las tablas automáticamente
# =============================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# n8n Webhook URL
# URL del webhook de n8n (actualizar cuando cambie ngrok)
# =============================================
n8n.webhook.url=https://TU-URL-NGROK.ngrok-free.dev/webhook/clima-ruta
